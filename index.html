<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
    <link rel="stylesheet" href="css/common/common.css">
    <link rel="stylesheet" href="css/common/layout.css">
    <link rel="stylesheet" href="css/style.css">

    <!-- Swiper js -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="js/common.js"></script>
    <script src="js/swiper.js"></script>

    <title>wooribank_site_clone</title>
</head>
<body>
    <header id="header"></header>
    <main id="mainSection">
        <!-- slide-container -->
        <section class="swiper slide-container">
            <div class="swiper-wrapper">
                <div class="swiper-slide">슬라이드 1</div>
                <div class="swiper-slide">슬라이드 2</div>
                <div class="swiper-slide">슬라이드 3</div>
                <div class="swiper-slide">슬라이드 4</div>
            </div>

            <div class="slide-btn-wrapper">
                <!-- 슬라이드 도트 -->
                <div class="swiper-pagination"></div>
                <!-- 슬라이드 play / stop -->
                <div class="swiper-control">
                    <button type="button" class="btn-stop">STOP</button>
                    <button type="button" class="btn-play">PLAY</button>
                </div>
                <!-- 이전/다음 버튼 -->
                <div class="swiper-button-prev"></div>
                <div class="swiper-button-next"></div>
            </div>
        </section>

        <!-- quick-menu -->
        <section class="quick-menu"></section>

        <!-- bank-product -->
        <section class="bank-product">
            <!-- box-product -->
            <div class="box-product">
                <h3>금융상품</h3>
                <ul class="product-list">
                    <li>
                        <a href="#">
                            <span class="ico-box">
                                <!-- <img src="images" alt="예금 아이콘"> -->
                            </span>
                            <span>예금</span>
                        </a>
                    </li>
                    <li>
                        <a href="#">
                            <span class="ico-box">
                                <!-- <img src="images" alt="대출 아이콘"> -->
                            </span>
                            <span>대출</span>
                        </a>
                    </li>
                    <li>
                        <a href="#">
                            <span class="ico-box">
                                <!-- <img src="images" alt="펀드 아이콘"> -->
                            </span>
                            <span>펀드</span>
                        </a>
                    </li>
                    <li>
                        <a href="#">
                            <span class="ico-box">
                                <!-- <img src="images" alt="외환 아이콘"> -->
                            </span>
                            <span>외환</span>
                        </a>
                    </li>
                    <li>
                        <a href="#">
                            <span class="ico-box">
                                <!-- <img src="images" alt="신탁 아이콘"> -->
                            </span>
                            <span>신탁</span>
                        </a>
                    </li>
                    <li>
                        <a href="#">
                            <span class="ico-box">
                                <!-- <img src="images" alt="신탁 아이콘"> -->
                            </span>
                            <span>퇴직연금</span>
                        </a>
                    </li>
                    <li>
                        <a href="#">
                            <span class="ico-box">
                                <!-- <img src="images" alt="신탁 아이콘"> -->
                            </span>
                            <span>보험</span>
                        </a>
                    </li>
                    <li>
                        <a href="#">
                            <span class="ico-box">
                                <!-- <img src="images" alt="신탁 아이콘"> -->
                            </span>
                            <span>ISA</span>
                        </a>
                    </li>
                </ul>
            </div>

            <!-- box-card -->
            <div class="box-card">
                <h3>카드</h3>
                <ul class="card-list">
                    <li>
                        <a href="#">
                            <span class="ico-box">
                                <!-- <img src="images" alt="카드신청 아이콘"> -->
                            </span>
                            <span>카드신청</span>
                        </a>
                    </li>
                    <li>
                        <a href="#">
                            <span class="ico-box">
                                <!-- <img src="images" alt="나의카드 아이콘"> -->
                            </span>
                            <span>나의카드</span>
                        </a>
                    </li>
                    <li>
                        <a href="#">
                            <span class="ico-box">
                                <!-- <img src="images" alt="이벤트 아이콘"> -->
                            </span>
                            <span>이벤트</span>
                        </a>
                    </li>
                </ul>
            </div>
        </section>

        <!-- bank-service -->
        <section class="bank-service"></section>

        <!-- board-news -->
        <section class="board-news"></section>
    </main>
    <footer id="footer"></footer>
</body>
</html>
